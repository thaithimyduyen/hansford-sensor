<!doctype html>
<html lang="vi">

<head>
    <!-- Basic -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO Title -->
    <title>{{title}} | Ứng dụng cảm biến rung Hansford Sensors</title>

    <!-- SEO Meta -->
    <meta name="description" content="{{application_description}}" />
    <meta name="keywords" content="{{application_keywords}}" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="{{application_url}}" />

    <!-- Favicon -->
    <link rel="shortcut icon" type="image/x-icon" href="/assets/images/favicon/favicon.ico" />

    <!-- Open Graph -->
    <meta property="og:type" content="article" />
    <meta property="og:title" content="{{title}}" />
    <meta property="og:description" content="{{application_description}}" />
    <meta property="og:url" content="{{application_url}}" />
    <meta property="og:image" content="https://hansford.vn/{{image}}" />
    <meta property="og:site_name" content="Hansford Sensors Vietnam | Nhà phân phối cảm biến rung" />
    <meta property="og:locale" content="vi_VN" />

    <!-- Article Meta -->
    <meta property="article:section" content="Ứng dụng công nghiệp" />
    <meta property="article:tag" content="{{application_tags}}" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{title}}" />
    <meta name="twitter:description" content="{{application_description}}" />
    <meta name="twitter:image" content="https://hansford.vn/{{image}}" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" />

    <!-- CSS -->
    <!-- tiny-slider -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tiny-slider/2.9.4/tiny-slider.css" />

    <!-- swiper -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <!-- tabler icons (bạn đang dùng rồi, giữ nguyên cũng ok) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.46.0/tabler-icons.min.css" />

    <!-- simplebar -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simplebar@6.2.5/dist/simplebar.min.css" />

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- css của bạn -->
    <link rel="stylesheet" href="/assets/css/theme.css" />

    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon/favicon-16x16.png">
    <link rel="manifest" href="/assets/images/favicon/site.webmanifest">

    <!-- Schema: TechArticle (rất tốt cho B2B / industrial) -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "TechArticle",
        "headline": "{{title}}",
        "description": "{{application_description}}",
        "image": "https://hansford.vn/{{image}}",
        "author": {
            "@type": "Organization",
            "name": "Hansford Sensors Vietnam | Nhà phân phối cảm biến rung"
        },
        "publisher": {
            "@type": "Organization",
            "name": "Hansford Sensors Vietnam | Nhà phân phối cảm biến rung",
            "logo": {
                "@type": "ImageObject",
                "url": "https://hansford.vn/assets/images/logo/logo.svg"
            }
        },
        "mainEntityOfPage": "{{application_url}}",
        "datePublished": "2026-04-05T08:00:00+07:00",
        "dateModified": "2026-05-05T08:00:00+07:00"
    }
    </script>

    <!-- Breadcrumb -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
            {
                "@type": "ListItem",
                "position": 1,
                "name": "Trang chủ",
                "item": "https://hansford.vn/"
            },
            {
                "@type": "ListItem",
                "position": 2,
                "name": "Ứng dụng công nghiệp",
                "item": "https://hansford.vn/industries"
            },
            {
                "@type": "ListItem",
                "position": 3,
                "name": "{{title}}",
                "item": "{{application_url}}"
            }
        ]
    }
    </script>
</head>

<body>
    <main>
        <div id="header"></div>
        <section class="bg-gray-100 py-4">
            <div class="container">
                <nav class="text-sm text-gray-600">
                    <ol class="flex items-center flex-wrap gap-2">

                        <li>
                            <a href="/index.html" class="hover:text-blue-600 transition">
                                Trang chủ
                            </a>
                        </li>

                        <li class="text-gray-400">/</li>

                        <li>
                            <a href="/industries" class="hover:text-blue-600 transition">
                                Tất cả ứng dụng công nghiệp
                            </a>
                        </li>

                        <li class="text-gray-400">/</li>

                        <li class="text-gray-900 font-medium">
                            {{title}}
                        </li>

                    </ol>
                </nav>
            </div>
        </section>
        <!-- Popular Products Start-->
        <section class="bg-white py-10 border-b">
            <div class="container">

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-center">

                    <!-- LEFT -->
                    <div>
                        <h1 class="text-3xl font-bold text-gray-900 mb-4">
                            {{title}}
                        </h1>

                        <p class="text-gray-600 text-lg">
                            {{description}}
                        </p>
                    </div>

                    <!-- RIGHT -->
                    <div class="flex justify-center">
                        <img src="{{image}}" alt="{{title}}" class="max-h-[300px] object-contain">
                    </div>

                </div>

            </div>
        </section>
        <!-- Popular Products End-->
        <section class="my-10">
            <div class="container max-w-4xl">
                {{sections_html}}
            </div>
        </section>

        <section class="my-12">
            <div class="container">

                <div class="bg-blue-600 text-white rounded-lg p-8 text-center">
                    <h3 class="text-white font-semibold mb-2">
                        Bạn cần hỗ trợ lựa chọn cảm biến phù hợp?
                    </h3>

                    <p class="mb-4 text-xl-100">
                        Liên hệ để được tư vấn và báo giá ngay
                    </p>

                    <a href="/contact.html" class="inline-flex items-center justify-center px-6 py-3 rounded-md
          border border-white text-white font-semibold transition">
                        Liên hệ ngay (+84) 938 888 958
                    </a>
                </div>

            </div>
        </section>

        <div id="footer"></div>
    </main>

    <script src="/assets/js/vendors/countdown.js"></script>
    <script src="/assets/js/vendors/tns-slider.js"></script>
    <script src="/assets/js/vendors/zoom.js"></script>
    <script src="/assets/js/vendors/language.js"></script>

    <!-- tiny-slider -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tiny-slider/2.9.4/min/tiny-slider.js"></script>

    <!-- swiper -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <!-- bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- simplebar -->
    <script src="https://cdn.jsdelivr.net/npm/simplebar@6.2.5/dist/simplebar.min.js"></script>

    <!-- script custom -->
    <script src="/assets/js/vendors/swiper.js"></script>
    <script src="/assets/js/vendors/validation.js"></script>

    <!-- Theme JS -->

    <!-- build:js assets/js/theme.min.js -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="/assets/js/main.js"></script>
</body>

</html>
