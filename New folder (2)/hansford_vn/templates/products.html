<!doctype html>
<html lang="en">

<head>
    <!-- Basic -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO Title -->
    <title>{{category_name}} | Cảm biến rung Hansford Sensors</title>

    <!-- SEO Meta -->
    <meta name="description" content="{{category_description}}" />
    <meta name="keywords" content="{{category_keywords}}" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="{{category_url}}" />

    <!-- Favicon -->
    <link rel="shortcut icon" type="image/x-icon" href="/assets/images/favicon/favicon.ico" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{{category_name}} | Hansford Sensors" />
    <meta property="og:description" content="{{category_description}}" />
    <meta property="og:url" content="{{category_url}}" />
    <meta property="og:image" content="{{category_image}}" />
    <meta property="og:site_name" content="Hansford Sensors Vietnam | Nhà phân phối cảm biến rung" />
    <meta property="og:locale" content="vi_VN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{category_name}}" />
    <meta name="twitter:description" content="{{category_description}}" />
    <meta name="twitter:image" content="{{category_image}}" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" />

    <!-- CSS -->
    <!-- tiny-slider -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tiny-slider/2.9.4/tiny-slider.css" />

    <!-- swiper -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <!-- tabler icons (bạn đang dùng rồi, giữ nguyên cũng ok) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.46.0/tabler-icons.min.css" />

    <!-- simplebar -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simplebar@6.2.5/dist/simplebar.min.css" />

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- css của bạn -->
    <link rel="stylesheet" href="/assets/css/theme.css" />

    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon/favicon-16x16.png">
    <link rel="manifest" href="/assets/images/favicon/site.webmanifest">

    <!-- Schema: ItemList (category product list) -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "ItemList",
        "name": "{{category_name}}",
        "description": "{{category_description}}",
        "url": "{{category_url}}",
        "numberOfItems": {{product_count}},
        "itemListElement": {{item_list_json}}
    }
    </script>

    <!-- Breadcrumb -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
            {
                "@type": "ListItem",
                "position": 1,
                "name": "Trang chủ",
                "item": "https://hansford.vn/"
            },
            {
                "@type": "ListItem",
                "position": 2,
                "name": "{{category_name}}",
                "item": "{{category_url}}"
            }
        ]
    }
    </script>
</head>

<body>
    <main>
        <div id="header"></div>
        <section class="bg-gray-100 py-4">
            <div class="container">
                <nav class="text-sm text-gray-600">
                    <ol class="flex items-center flex-wrap gap-2">

                        <li>
                            <a href="/index.html" class="hover:text-blue-600 transition">
                                Trang chủ
                            </a>
                        </li>

                        <li class="text-gray-400">/</li>

                        <li>
                            <a href="/categories/" class="hover:text-blue-600 transition">
                                Tất cả danh mục
                            </a>
                        </li>

                        <li class="text-gray-400">/</li>

                        <li class="text-gray-900 font-medium">
                            {{category_name}}
                        </li>

                    </ol>
                </nav>
            </div>
        </section>
        <!-- Popular Products Start-->
        <section class="lg:my-14 my-8">
            <div class="container">
                <div class="flex flex-wrap">
                    <div class="w-full mb-6 text-center">
                        <h2 class="text-lg font-semibold">{{category_name}}</h2>
                    </div>
                    <p class="text-black-500 fs-6" style="margin-bottom: 50px;">{{category_description}}</p>
                </div>

                <div class="grid gap-4 grid-cols-1 md:grid-cols-2 lg:gap-4 xl:grid-cols-5">
                    {{products_html}}
                </div>
            </div>
        </section>
        <!-- Popular Products End-->
        <section class="my-12">
            <div class="container">

                <div class="bg-blue-600 text-white rounded-lg p-8 text-center">
                    <h3 class="text-white font-semibold mb-2">
                        Bạn cần hỗ trợ lựa chọn cảm biến phù hợp?
                    </h3>

                    <p class="mb-4 text-xl-100">
                        Liên hệ để được tư vấn và báo giá ngay
                    </p>

                    <a href="/contact.html" class="inline-flex items-center justify-center px-6 py-3 rounded-md
          border border-white text-white font-semibold transition">
                        Liên hệ ngay (+84) 938 888 958
                    </a>
                </div>

            </div>
        </section>

        <div id="footer"></div>
    </main>
    <script src="/assets/js/vendors/countdown.js"></script>
    <script src="/assets/js/vendors/tns-slider.js"></script>
    <script src="/assets/js/vendors/zoom.js"></script>
    <script src="/assets/js/vendors/language.js"></script>

    <!-- tiny-slider -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tiny-slider/2.9.4/min/tiny-slider.js"></script>

    <!-- swiper -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <!-- bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- simplebar -->
    <script src="https://cdn.jsdelivr.net/npm/simplebar@6.2.5/dist/simplebar.min.js"></script>

    <!-- script custom -->
    <script src="/assets/js/vendors/swiper.js"></script>
    <script src="/assets/js/vendors/validation.js"></script>

    <!-- Theme JS -->

    <!-- build:js assets/js/theme.min.js -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="/assets/js/main.js"></script>
</body>

</html>
